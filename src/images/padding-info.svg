<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" font-family="sans-serif">

  <!-- Card background -->
  <rect width="280" height="160" rx="8" fill="#f4f6f9"/>

  <!-- Chart canvas (full area, no margin shown) -->
  <rect x="8" y="8" width="264" height="144" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Padding zone (tinted) -->
  <rect x="8" y="8" width="264" height="144" rx="4" fill="#e8f4ff" opacity="0.5"/>

  <!-- Plot area (inside padding) -->
  <!-- padding: top=18, bottom=18, left=28, right=20 -->
  <rect x="36" y="26" width="228" height="108" rx="2" fill="white"/>

  <!-- Grid lines -->
  <line x1="36" y1="55"  x2="264" y2="55"  stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="36" y1="85"  x2="264" y2="85"  stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="36" y1="115" x2="264" y2="115" stroke="#e8e8e8" stroke-width="0.8"/>
  <!-- Axes -->
  <line x1="36" y1="134" x2="264" y2="134" stroke="#c8d0d8" stroke-width="1"/>
  <line x1="36" y1="26"  x2="36"  y2="134" stroke="#c8d0d8" stroke-width="1"/>
  <!-- Chart line -->
  <polyline points="36,125 82,95 128,110 174,65 220,82 264,68"
    fill="none" stroke="#4AAFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- padding_top arrow -->
  <line x1="150" y1="9"  x2="150" y2="25" stroke="#4AAFFF" stroke-width="1.5"/>
  <line x1="150" y1="25" x2="150" y2="9"  stroke="#4AAFFF" stroke-width="1.5"/>
  <rect x="112" y="12" width="76" height="11" rx="2" fill="#e8f4ff" opacity="0.95"/>
  <text x="150" y="20" text-anchor="middle" font-size="8.5" fill="#1a7fd4" font-weight="600">padding_top</text>

  <!-- padding_bottom arrow -->
  <line x1="150" y1="135" x2="150" y2="151" stroke="#4AAFFF" stroke-width="1.5"/>
  <rect x="108" y="138" width="84" height="11" rx="2" fill="#e8f4ff" opacity="0.95"/>
  <text x="150" y="146" text-anchor="middle" font-size="8.5" fill="#1a7fd4" font-weight="600">padding_bottom</text>

  <!-- padding_left arrow -->
  <line x1="9"  y1="80" x2="35" y2="80" stroke="#4AAFFF" stroke-width="1.5"/>
  <rect x="8" y="69" width="28" height="26" rx="2" fill="#e8f4ff" opacity="0.95"/>
  <text x="22" y="77" text-anchor="middle" font-size="7.5" fill="#1a7fd4" font-weight="600" transform="rotate(-90,22,80)">padding_left</text>

  <!-- padding_right arrow -->
  <line x1="265" y1="80" x2="271" y2="80" stroke="#4AAFFF" stroke-width="1.5"/>
  <rect x="244" y="69" width="28" height="26" rx="2" fill="#e8f4ff" opacity="0.95"/>
  <text x="258" y="77" text-anchor="middle" font-size="7.5" fill="#1a7fd4" font-weight="600" transform="rotate(90,258,80)">padding_right</text>

</svg>
