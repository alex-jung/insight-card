<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 160" font-family="sans-serif">

  <!-- Card background -->
  <rect width="280" height="160" rx="8" fill="#f4f6f9"/>

  <!-- Card border hint -->
  <rect x="1" y="1" width="278" height="158" rx="7" fill="none" stroke="#d0d8e0" stroke-width="1"/>
  <text x="140" y="11" text-anchor="middle" font-size="8" fill="#a0b0c0" letter-spacing="1">CARD</text>

  <!-- Margin zone (tinted) -->
  <rect x="1" y="1" width="278" height="158" rx="7" fill="#fff3e0" opacity="0.5"/>

  <!-- Chart area (white box inside margin) -->
  <!-- margin: top=20, bottom=18, left=22, right=22 -->
  <rect x="22" y="20" width="236" height="122" rx="4" fill="white" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Grid lines inside chart -->
  <line x1="38" y1="50"  x2="252" y2="50"  stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="38" y1="80"  x2="252" y2="80"  stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="38" y1="110" x2="252" y2="110" stroke="#e8e8e8" stroke-width="0.8"/>
  <line x1="38" y1="130" x2="252" y2="130" stroke="#c8d0d8" stroke-width="1"/>
  <line x1="38" y1="28"  x2="38"  y2="130" stroke="#c8d0d8" stroke-width="1"/>
  <polyline points="38,122 80,95 122,108 164,68 206,84 252,70"
    fill="none" stroke="#4AAFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- margin_top arrow -->
  <line x1="140" y1="2"  x2="140" y2="19" stroke="#f0a030" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="140" y1="19" x2="140" y2="2"  stroke="#f0a030" stroke-width="1.5" marker-end="url(#ao)"/>
  <rect x="102" y="5" width="76" height="11" rx="2" fill="#fff3e0" opacity="0.9"/>
  <text x="140" y="13" text-anchor="middle" font-size="8.5" fill="#e08000" font-weight="600">margin_top</text>

  <!-- margin_bottom arrow -->
  <line x1="140" y1="142" x2="140" y2="158" stroke="#f0a030" stroke-width="1.5"/>
  <rect x="102" y="146" width="76" height="11" rx="2" fill="#fff3e0" opacity="0.9"/>
  <text x="140" y="154" text-anchor="middle" font-size="8.5" fill="#e08000" font-weight="600">margin_bottom</text>

  <!-- margin_left arrow -->
  <line x1="2"  y1="81" x2="21" y2="81" stroke="#f0a030" stroke-width="1.5"/>
  <rect x="1" y="73" width="20" height="26" rx="2" fill="#fff3e0" opacity="0.95"/>
  <text x="11" y="80" text-anchor="middle" font-size="7.5" fill="#e08000" font-weight="600" transform="rotate(-90,11,81)">margin_left</text>

  <!-- margin_right arrow -->
  <line x1="259" y1="81" x2="278" y2="81" stroke="#f0a030" stroke-width="1.5"/>
  <rect x="259" y="73" width="20" height="26" rx="2" fill="#fff3e0" opacity="0.95"/>
  <text x="269" y="78" text-anchor="middle" font-size="7.5" fill="#e08000" font-weight="600" transform="rotate(90,269,81)">margin_right</text>

  <!-- dimension lines: top -->
  <line x1="52"  y1="14" x2="228" y2="14" stroke="#f0a030" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="52"  y1="10" x2="52"  y2="18" stroke="#f0a030" stroke-width="0.8"/>
  <line x1="228" y1="10" x2="228" y2="18" stroke="#f0a030" stroke-width="0.8"/>

</svg>
