name: CI

on:
    push:
        branches: ["**"]
        tags-ignore: ["v*"]
    pull_request:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4.2.2

            - uses: actions/setup-node@v4.4.0
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Type check
              run: npm run lint

            - name: Build all cards
              run: npm run build

            - name: Upload dist
              uses: actions/upload-artifact@v4.6.2
              with:
                  name: dist
                  path: dist/insight-chart.js
                  retention-days: 7
