services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: insight-card-ha
    restart: unless-stopped
    privileged: true
    ports:
      - "8123:8123"
    volumes:
      - ./docker/ha-config:/config
      - ./dist:/config/www/insight-card:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Berlin
